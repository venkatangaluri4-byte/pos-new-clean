<!DOCTYPE html>
<html>
<head>
  <title>Products</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .card {
      border: 1px solid #ddd;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<h2>Products</h2>
<div id="list">Loading...</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const client = supabase.createClient(
  "https://kyyspgesdvpzajvoaoir.supabase.co",
  "sb_publishable_uxbSDRGHJS84hhc-kvOaQw_yINaoJHY"
);

async function loadProducts() {
  const { data, error } = await client.from("products").select("*");

  if (error) {
    document.getElementById("list").innerText = error.message;
    console.error(error);
    return;
  }

  if (!data.length) {
    document.getElementById("list").innerText = "No products found";
    return;
  }

  document.getElementById("list").innerHTML = data.map(p => `
    <div class="card">
      <b>${p.name}</b><br>
      Color: ${p.color || "-"}<br>
      Price: ${p.selling_price}
    </div>
  `).join("");
}

loadProducts();
</script>

</body>
</html>
